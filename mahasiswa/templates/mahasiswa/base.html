{% load static %}

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}RPL Django{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Custom -->
    <link rel="stylesheet" href="{% static 'mahasiswa/css/style.css' %}">

    <style>
        body {
            background-color: #f4f6f9;
        }

        header {
            background-color: #3469a8;
            color: white;
            padding: 50px 30px;
        }

        header h1 {
            font-size: 50px;
            font-weight: bold;
            margin: 0;
        }

        .navbar-custom {
            background-color: #0d6efd;
        }

        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link,
        .navbar-custom span {
            color: white !important;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            color: #666;
        }
    </style>

</head>

<body>

    <!-- Header -->
    <header>
        <h1>Praktikum RPL - Django</h1>
    </header>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">

            <div class="ms-auto">

                {% if request.user.is_authenticated %}

                <span class="me-3">
                    Halo, {{ request.user.username }}!
                </span>

                <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
                    Logout
                </a>

                {% else %}

                <a href="{% url 'login' %}" class="btn btn-light btn-sm">
                    Login
                </a>

                {% endif %}

            </div>

        </div>
    </nav>

    <!-- Content -->
    <main class="container mt-4">

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    <footer>
        <hr>
        <p>&copy; 2025 - Praktikum RPL Django</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Custom -->
    <script src="{% static 'mahasiswa/js/main.js' %}"></script>

</body>

</html>
